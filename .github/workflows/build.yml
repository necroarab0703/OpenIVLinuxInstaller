name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl xz-utils tar desktop-file-utils libgdk-pixbuf2.0-dev

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp && ./appimagetool --appimage-extract 2>/dev/null || true

      - name: Download OpenIVSetup.exe
        run: |
          mkdir -p build
          wget -q "https://archive.org/download/openiv_202304/OpenIVSetup.exe" -O build/OpenIVSetup.exe
          echo "OpenIVSetup.exe size: $(du -h build/OpenIVSetup.exe | cut -f1)"

      - name: Setup AppDir Structure
        run: |
          APP_DIR="build/openiv-installer.AppDir"
          mkdir -p "$APP_DIR/usr/share/openiv/wine" "$APP_DIR/usr/share/applications"
          
          cp OpenIVScripts/OpenIVLinuxInstaller.sh "$APP_DIR/"
          cp AppImage/AppRun "$APP_DIR/"
          cp AppImage/openiv.desktop "$APP_DIR/"
          cp AppImage/openiv.png "$APP_DIR/"
          cp build/OpenIVSetup.exe "$APP_DIR/usr/share/openiv/"
          
          wget -q "https://github.com/Kron4ek/Wine-Builds/releases/download/11.9/wine-11.9-staging-x86.tar.xz" -O /tmp/wine-bundle.tar.xz
          tar -xJf /tmp/wine-bundle.tar.xz -C "$APP_DIR/usr/share/openiv/wine" --strip-components=1
          chmod +x "$APP_DIR/AppRun" "$APP_DIR/OpenIVLinuxInstaller.sh"

      - name: Build AppImage
        run: |
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run build/openiv-installer.AppDir OpenIV-x86_64.AppImage

      - name: Create Release Page
        uses: softprops/action-gh-release@v1
        with:
          name: OpenIV Linux Installer ${{ github.ref_name }}
          body: |
            ## OpenIV Linux Installer v5.0.4
            - Bundles portable Wine 11.9 staging (native x86/32-bit).
            - Pre-bundled OpenIVSetup.exe — no runtime download needed.
            - Dynamically builds the 32-bit compatibility prefix locally on first launch.
          files: OpenIV-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
