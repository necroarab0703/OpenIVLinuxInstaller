name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl xz-utils tar desktop-file-utils wine32 wine64 cabextract xvfb

      - name: Pre-bake Wine Prefix with Winetricks
        run: |
          export WINEARCH=win32
          export WINEPREFIX="$GITHUB_WORKSPACE/prebaked_prefix"
          
          # Download and run winetricks silently in the cloud
          wget -q https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks -O /tmp/winetricks
          chmod +x /tmp/winetricks
          
          # Install the massive runtimes on the cloud server inside a headless virtual frame buffer
          xvfb-run -a /tmp/winetricks -q dotnet48

          # Fetch stable DXVK binaries
          wget -q https://github.com/doitsujin/dxvk/releases/download/v2.4/dxvk-2.4.tar.gz -O /tmp/dxvk.tar.gz
          tar -zxf /tmp/dxvk.tar.gz -C /tmp/

          # Copy 32-bit DXVK DLLs into the cloud prefix system folders
          cp /tmp/dxvk-2.4/x32/d3d11.dll "$GITHUB_WORKSPACE/prebaked_prefix/drive_c/windows/system32/"
          cp /tmp/dxvk-2.4/x32/dxgi.dll "$GITHUB_WORKSPACE/prebaked_prefix/drive_c/windows/system32/"

          xvfb-run -a /tmp/winetricks -q vcrun2019
          xvfb-run -a /tmp/winetricks -q d3dx11_43

      - name: Setup AppDir Structure
        run: |
          APP_DIR="build/openiv-installer.AppDir"
          mkdir -p "$APP_DIR/usr/share/openiv/wine" "$APP_DIR/usr/share/applications"
          
          # Copy scripts and prebaked prefix archive
          cp OpenIVScripts/OpenIVLinuxInstaller.sh "$APP_DIR/"
          cp AppImage/AppRun "$APP_DIR/"
          cp AppImage/openiv.desktop "$APP_DIR/"
          cp AppImage/openiv.png "$APP_DIR/"
          
          # Embed pre-installed New Technology Studio into the prebaked prefix AppData
          mkdir -p "$GITHUB_WORKSPACE/prebaked_prefix/drive_c/users/runner/AppData/Local/"
          cp -r "$GITHUB_WORKSPACE/New Technology Studio" "$GITHUB_WORKSPACE/prebaked_prefix/drive_c/users/runner/AppData/Local/"
          
          # Pack the cloud-built prefix into the distribution asset tree
          cd "$GITHUB_WORKSPACE/prebaked_prefix" && tar -cJf "$GITHUB_WORKSPACE/$APP_DIR/usr/share/openiv/prefix-core.tar.xz" .
          
          # Fetch Kron4ek portable Wine execution layer
          cd "$GITHUB_WORKSPACE"
          wget -q "https://github.com/Kron4ek/Wine-Builds/releases/download/11.9/wine-11.9-staging-amd64.tar.xz" -O /tmp/wine-bundle.tar.xz
          tar -xJf /tmp/wine-bundle.tar.xz -C "$APP_DIR/usr/share/openiv/wine" --strip-components=1
          chmod +x "$APP_DIR/AppRun" "$APP_DIR/OpenIVLinuxInstaller.sh"

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run build/openiv-installer.AppDir OpenIV-x86_64.AppImage

      - name: Create Release Page
        uses: softprops/action-gh-release@v1
        with:
          name: OpenIV Portable Launcher ${{ github.ref_name }}
          body: |
            ## OpenIV DXVK Release (v6.2.0)
            - **Direct Launch:** OpenIV is pre-installed and ready to run — no setup wizard.
            - **DXVK 2.4 Injected:** Vulkan translation layers pre-deployed into the prefix.
            - **Offline Capable:** All assets bundled, no network required.
          files: OpenIV-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
