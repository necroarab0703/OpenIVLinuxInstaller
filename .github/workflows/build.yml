name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl desktop-file-utils libgdk-pixbuf2.0-dev

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp
          ./appimagetool --appimage-extract 2>/dev/null || true
          echo "appimagetool ready"

      - name: Setup AppDir
        run: |
          mkdir -p Build/AppDir
          cp OpenIVScripts/OpenIVLinuxInstaller.sh Build/AppDir/
          cp AppImage/AppRun Build/AppDir/
          cp AppImage/openiv.desktop Build/AppDir/
          cp AppImage/openiv.png Build/AppDir/
          chmod +x Build/AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 /tmp/squashfs-root/AppRun Build/AppDir OpenIV-x86_64.AppImage || \
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run Build/AppDir OpenIV-x86_64.AppImage

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: OpenIV Linux Installer ${{ github.ref_name }}
          body: |
            ## OpenIV Linux Installer ${{ github.ref_name }}

            ### Downloads
            - **AppImage**: `OpenIV-x86_64.AppImage` (runs standalone)
            - **Shell Script**: `OpenIVLinuxInstaller.sh` (from source)

            ### Usage
            ```bash
            # AppImage
            chmod +x OpenIV-x86_64.AppImage
            ./OpenIV-x86_64.AppImage

            # Shell script
            chmod +x OpenIVLinuxInstaller.sh
            ./OpenIVLinuxInstaller.sh
            ```

            ### What's New
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: |
            OpenIV-x86_64.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
