name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # Host deps for the build pipeline
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            wget curl xz-utils tar \
            desktop-file-utils libgdk-pixbuf2.0-dev

      # Install Wine engine on the runner host
      - name: Install System Wine Engine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine32 wine64 winetricks

      # Initialize Base Wine Prefix with DXVK + pre-installed app
      - name: Initialize Base Wine Prefix
        run: |
          export WINEPREFIX="$GITHUB_WORKSPACE/prebaked_prefix"
          wineboot -i

          # Fetch DXVK 2.4 and inject into prefix
          wget -q https://github.com/doitsujin/dxvk/releases/download/v2.4/dxvk-2.4.tar.gz -O /tmp/dxvk.tar.gz
          tar -zxf /tmp/dxvk.tar.gz -C /tmp/
          cp /tmp/dxvk-2.4/x32/d3d11.dll "$WINEPREFIX/drive_c/windows/system32/"
          cp /tmp/dxvk-2.4/x32/dxgi.dll "$WINEPREFIX/drive_c/windows/system32/"

          # Embed pre-installed New Technology Studio into runner AppData
          mkdir -p "$WINEPREFIX/drive_c/users/runner/AppData/Local/"
          cp -r "$GITHUB_WORKSPACE/New Technology Studio" "$WINEPREFIX/drive_c/users/runner/AppData/Local/"

      # Download appimagetool
      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp && ./appimagetool --appimage-extract 2>/dev/null || true

      # Assemble AppDir
      - name: Setup AppDir Structure
        run: |
          mkdir -p Build/AppDir/usr/share/openiv/
          # Copy the baked prefix containing the system runtimes and New Technology Studio straight into the package
          cp -r prebaked_prefix Build/AppDir/usr/share/openiv/prefix

          # Copy the launcher script template
          cp OpenIVScripts/OpenIVLinuxInstaller.sh Build/AppDir/AppRun
          chmod +x Build/AppDir/AppRun

      # Build AppImage
      - name: Build AppImage
        run: |
          ARCH=x86_64 /tmp/squashfs-root/AppRun Build/AppDir OpenIV-x86_64.AppImage || \
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run Build/AppDir OpenIV-x86_64.AppImage

      # Create Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: OpenIV Portable Launcher ${{ github.ref_name }}
          body: |
            ## OpenIV Self-Contained Portable Release (v7.1.0)

            ### Downloads
            - **AppImage**: `OpenIV-x86_64.AppImage` — **100% offline**, zero network at runtime

            ### What's Bundled Inside the AppImage
            - Portable Wine-GE (GlitchEggroll) — high-compatibility runtime with libfreetype, gnutls
            - Pre-baked Wine prefix with .NET 4.8, VC++ 2019, D3DX11.43, **DXVK 2.4** pre-installed
            - **New Technology Studio** — OpenIV pre-installed and ready to launch, no setup wizard
            - First-run extraction: **~3 seconds**

            ### Usage
            ```bash
            chmod +x OpenIV-x86_64.AppImage
            ./OpenIV-x86_64.AppImage
            ```

            ### Changelog
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: |
            OpenIV-x86_64.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
